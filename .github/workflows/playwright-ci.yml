name: Playwright UI Coverage

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    name: Login, workspace, dock, chat, reporting, accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CAMPUS_FPM_DB_PATH: ${{ runner.temp }}/mufinances-playwright.db
      CAMPUS_FPM_RATE_LIMIT_PER_MINUTE: "100000"
      CAMPUS_FPM_LOGIN_RATE_LIMIT_PER_MINUTE: "100000"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Install Node dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start muFinances
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 3200 > $RUNNER_TEMP/mufinances.log 2>&1 &
          echo $! > $RUNNER_TEMP/mufinances.pid
      - name: Wait for muFinances
        run: |
          python - <<'PY'
          import time, urllib.request
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen('http://127.0.0.1:3200/api/health', timeout=2) as response:
                      if response.status == 200:
                          raise SystemExit(0)
              except Exception:
                  time.sleep(1)
          raise SystemExit('muFinances did not become healthy in time')
          PY
      - name: Run Playwright coverage
        run: npm run test:playwright:ci
      - name: Upload Playwright report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
            ${{ runner.temp }}/mufinances.log

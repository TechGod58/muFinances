services:
  mufinances:
    environment:
      CAMPUS_FPM_DB_BACKEND: postgres
      CAMPUS_FPM_POSTGRES_DSN: ${CAMPUS_FPM_POSTGRES_DSN:?Set CAMPUS_FPM_POSTGRES_DSN before starting PostgreSQL runtime}
      CAMPUS_FPM_DB_SSL_MODE: prefer
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mufinances -d mufinances"]
      interval: 10s
      timeout: 5s
      retries: 5
